services:
  # PostgreSQL database with health check
  postgres:
    image: postgres:13@sha256:1094e2cdc5605e5c7914633bcd93758a9c52ae8c8b2855ddd1c3a8afbe4795d5
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis for caching and session management
  redis:
    image: redis:7-alpine@sha256:b1addbe72465a718643cff9e60a58e6df1841e29d6d7d60c9a85d8d72f08d1a7
    container_name: sentinel-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - sentinel-network

  # Database migrations (runs once before auth-service starts)
  db-migrate:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: sentinel-db-migrate
    environment:
      # Point at the Postgres service via its Docker network hostname
      # (container_name). Must not be `localhost` — that would resolve
      # to the db-migrate container itself inside the Compose network.
      - POSTGRES_HOST=sentinel-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-sentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-sentinel}
      # Migration role = sentinel (owner/superuser, BYPASSRLS).
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@sentinel-postgres:5432/${POSTGRES_DB:-sentinel}
      # T-028: migration 20260524_001 promotes sentinel_app to LOGIN and sets
      # its password from this env var. App services consume the runtime DSN
      # built from the same secret.
      - SENTINEL_APP_DB_PASSWORD=${SENTINEL_APP_DB_PASSWORD:?set SENTINEL_APP_DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sentinel-network
    working_dir: /app/migrations
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

  # Authentication service with dependency
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: sentinel-auth-service
    environment:
      # T-028: runtime DSN uses sentinel_app (NOSUPERUSER NOBYPASSRLS).
      # Per-request SET LOCAL app.tenant_id is issued by _lib/tenancy.
      - DATABASE_URL=postgresql://sentinel_app:${SENTINEL_APP_DB_PASSWORD:?set SENTINEL_APP_DB_PASSWORD}@sentinel-postgres:5432/${POSTGRES_DB:-sentinel}
      # T-028: single-tenant fallback for pre-auth DB lookups (e.g. login
      # before the JWT is parsed). Multi-tenant deploys leave this unset.
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-1}
      # T-028: bootstrap admin row writes to this tenant_id.
      - BOOTSTRAP_TENANT_ID=${BOOTSTRAP_TENANT_ID:-1}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@yourdomain.com}
      - LOCKOUT_THRESHOLD=5
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - sentinel-network
    restart: unless-stopped

  # Kafka for message queuing
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0@sha256:d18e7b3a81326dd278a5f2121b29a7f009582e0b0f5552165eb5efc83533a52b
    container_name: sentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sentinel-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0@sha256:69022c46b7f4166ecf21689ab4c20d030b0a62f2d744c20633abfc7c0040fa80
    container_name: sentinel-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # API Gateway
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: sentinel-api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5000
      - DATA_COLLECTOR_URL=http://data-collector:5001
      - ALERT_SERVICE_URL=http://alert-service:5002
      - POLICY_SERVICE_URL=http://policy-orchestrator:5004
      - COMPLIANCE_ENGINE_URL=http://compliance-engine:5007
      - XAI_SERVICE_URL=http://xai-service:5006
      - AI_ENGINE_URL=http://ai-engine:5003
      - DRL_ENGINE_URL=http://drl-engine:5005
      - HARDENING_SERVICE_URL=http://hardening-service:5011
      - HIDS_AGENT_URL=http://hids-agent:5010
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
      # Phase 0 slice 5 — OTel pilot. Empty = telemetry disabled (no-op).
      # Set to `http://tempo:4317` (or an OTLP collector) to enable. Start the
      # `observability` profile locally: `docker compose --profile observability up`.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=api-gateway
    depends_on:
      - auth-service
      - data-collector
      - alert-service
      - policy-orchestrator
      - compliance-engine
      - xai-service
      - hardening-service
      - hids-agent
    networks:
      - sentinel-network
    restart: unless-stopped

  # Data Collector
  data-collector:
    build:
      context: ./backend
      dockerfile: data-collector/Dockerfile
    container_name: sentinel-data-collector
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5000
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - sentinel-network
    cap_add:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # High-speed XDP Collector (bare-metal / privileged container)
  # XDP is opt-in and privileged, but remains on the Compose bridge network.
  # Operators can override Kafka/auth endpoints through the XDP_* variables.
  xdp-collector:
    build:
      context: ./backend
      dockerfile: xdp-collector/Dockerfile
    container_name: sentinel-xdp-collector
    profiles: ["xdp"]
    # XDP requires privileges to attach to the configured NIC.
    privileged: true
    environment:
      - PORT=5012
      - XDP_ENABLED=true
      - XDP_INTERFACE=eth0
      - XDP_QUEUE_COUNT=1
      - KAFKA_BOOTSTRAP_SERVERS=${XDP_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - AUTH_SERVICE_URL=${XDP_AUTH_SERVICE_URL:-http://auth-service:5000}
      - REDIS_URL=redis://redis:6379
    command:
      - /bin/sh
      - -c
      - >
        exec gunicorn app:app -b 0.0.0.0:5012 -k gevent -w 4 --timeout 120 --access-logfile -
    depends_on:
      auth-service:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sentinel-network
    restart: unless-stopped

  # Alert Service
  alert-service:
    build:
      context: ./backend
      dockerfile: alert-service/Dockerfile
    container_name: sentinel-alert-service
    environment:
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5000
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-admin@example.com}
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    depends_on:
      - redis
      - auth-service
    networks:
      - sentinel-network
    restart: unless-stopped

  # AI Detection Engine
  ai-engine:
    build:
      context: ./backend
      dockerfile: ai-engine/Dockerfile
    container_name: sentinel-ai-engine
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MODEL_PATH=/models
      - CONFIDENCE_THRESHOLD=0.85
      - BATCH_SIZE=1000
      - AUTH_SERVICE_URL=http://auth-service:5000
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    volumes:
      - ai_models:/models
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - sentinel-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Elasticsearch for logging (optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0@sha256:4f588d1001c207d6217e61747df8752c5d2a04c41e3a235c621bfa3a57e352f5
    container_name: sentinel-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - sentinel-network
    restart: unless-stopped

  # Kibana for log visualization (optional)
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.0@sha256:7963042ab4dfe95a5577c6c1bcb871a1c63cb1e92f61403945f298ba0a7dcbfe
    container_name: sentinel-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - sentinel-network
    restart: unless-stopped

  # Policy Orchestrator
  policy-orchestrator:
    build:
      context: ./backend
      dockerfile: policy-orchestrator/Dockerfile
    container_name: sentinel-policy-orchestrator
    environment:
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5000
      - DATABASE_URL=postgresql://sentinel_app:${SENTINEL_APP_DB_PASSWORD:?set SENTINEL_APP_DB_PASSWORD}@sentinel-postgres:5432/${POSTGRES_DB:-sentinel}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-1}
      - USE_V2_REVERSIBLE_ENFORCEMENT=${USE_V2_REVERSIBLE_ENFORCEMENT:-true}
      - ENFORCEMENT_DEFAULT_TTL_SECONDS=${ENFORCEMENT_DEFAULT_TTL_SECONDS:-900}
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    depends_on:
      redis:
        condition: service_started
      auth-service:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    networks:
      - sentinel-network
    restart: unless-stopped

  # Reversible enforcement TTL reaper
  enforcement-reaper:
    build:
      context: ./backend
      dockerfile: policy-orchestrator/Dockerfile
    container_name: sentinel-enforcement-reaper
    command: ["python", "enforcement_reaper.py"]
    environment:
      - DATABASE_URL=postgresql://sentinel_app:${SENTINEL_APP_DB_PASSWORD:?set SENTINEL_APP_DB_PASSWORD}@sentinel-postgres:5432/${POSTGRES_DB:-sentinel}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-1}
      - ENFORCEMENT_REAPER_INTERVAL_SECONDS=${ENFORCEMENT_REAPER_INTERVAL_SECONDS:-30}
      - ENFORCEMENT_REAPER_BATCH_SIZE=${ENFORCEMENT_REAPER_BATCH_SIZE:-100}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - sentinel-network
    restart: unless-stopped

  # DRL Engine
  drl-engine:
    build:
      context: ./backend
      dockerfile: drl-engine/Dockerfile
    container_name: sentinel-drl-engine
    environment:
      - REDIS_URL=redis://redis:6379
      - AI_ENGINE_URL=http://ai-engine:5003
      - POLICY_SERVICE_URL=http://policy-orchestrator:5004
      - MODEL_PATH=/models/drl
      - AUTH_SERVICE_URL=http://auth-service:5000
      # Shadow mode: decisions logged + tagged shadow=true, NOT enforced.
      # Promotion ladder: shadow → canary → enforce. See docs/RISK-TIERS.md.
      - DRL_SHADOW_MODE=${DRL_SHADOW_MODE:-true}
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    volumes:
      - ai_models:/models
    depends_on:
      - redis
      - ai-engine
      - policy-orchestrator
      - auth-service
    networks:
      - sentinel-network
    restart: unless-stopped

  # XAI Service
  xai-service:
    build:
      context: ./backend
      dockerfile: xai-service/Dockerfile
    container_name: sentinel-xai-service
    environment:
      - REDIS_URL=redis://redis:6379
      - AI_ENGINE_URL=http://ai-engine:5003
      - DRL_ENGINE_URL=http://drl-engine:5005
      - AUTH_SERVICE_URL=http://auth-service:5000
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    depends_on:
      - redis
      - auth-service
    networks:
      - sentinel-network
    restart: unless-stopped

  # Compliance Engine
  compliance-engine:
    build:
      context: ./backend
      dockerfile: compliance-engine/Dockerfile
    container_name: sentinel-compliance-engine
    environment:
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5000
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    depends_on:
      - redis
      - auth-service
    networks:
      - sentinel-network
    restart: unless-stopped

  # HIDS Agent - eBPF-powered host intrusion detection
  hids-agent:
    build:
      context: ./backend
      dockerfile: hids-agent/Dockerfile
    container_name: sentinel-hids-agent
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AUTH_SERVICE_URL=http://auth-service:5000
      - FIM_PATHS=/etc/passwd,/etc/shadow,/etc/sudoers,/etc/ssh/sshd_config
      - HOST_ROOT=/host
      - FIM_CHECK_INTERVAL=60
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    volumes:
      - /etc:/host/etc:ro
      - /var/log:/host/var/log:ro
      - /proc:/host/proc:ro
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - sentinel-network
    cap_add:
      - BPF
      - PERFMON
      - SYS_ADMIN
      - SYS_RESOURCE
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # System Hardening Service (eBPF runtime enforcement + CIS benchmarks)
  hardening-service:
    build:
      context: ./backend
      dockerfile: hardening-service/Dockerfile
    container_name: sentinel-hardening-service
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AUTH_SERVICE_URL=http://auth-service:5000
      - HOST_ROOT=/host
      # Compose bridge peers need the HTTP listener on the container interface.
      - SENTINEL_BIND_HOST=0.0.0.0
    volumes:
      # Read-only host config: posture assessment + FIM only. Active CIS
      # remediation that writes host /etc requires an explicit operator
      # override (mount :rw) and is intentionally not the default (audit SEC-03).
      - /etc:/host/etc:ro
      - /proc:/host/proc:ro
      - hardening_backups:/var/lib/sentinel/backups
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - sentinel-network
    # Least privilege instead of always-on privileged:true (audit SEC-03).
    # eBPF LSM attach needs these caps; if the kernel still refuses, the
    # service reports degraded mode rather than silently no-op'ing (SUB-03).
    cap_drop:
      - ALL
    cap_add:
      - BPF
      - PERFMON
      - SYS_ADMIN
      - SYS_RESOURCE
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Admin Console (production-ready build)
  admin-console:
    build:
      context: ./frontend/admin-console
      dockerfile: Dockerfile
    container_name: sentinel-admin-console
    ports:
      - "3000:8080"
    environment:
      - SENTINEL_API_PROXY=http://api-gateway:8080
      - SENTINEL_ENV=production
    depends_on:
      - api-gateway
    networks:
      - sentinel-network
    restart: unless-stopped

  # Prometheus metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0@sha256:3305cd2e483c13364c94ae4905368eb425c9fa804f8e523ee47d8bf4de9d87a2
    container_name: sentinel-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - sentinel-network
    restart: unless-stopped

  # Grafana dashboards
  grafana:
    image: grafana/grafana:10.4.0@sha256:c7ae30e06ee76656f4faf37df1f0d0dfb6941a706b66800a7b289a304d31d771
    container_name: sentinel-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?set GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - sentinel-network
    restart: unless-stopped

  # Tempo — distributed tracing backend. Phase 0 slice 5 pilot.
  # Opt-in profile so the default `docker compose up` stays lightweight.
  # Enable with: `docker compose --profile observability up -d tempo`
  # then export OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317 before restarting
  # the api-gateway container.
  tempo:
    image: grafana/tempo:2.5.0@sha256:be9fb28c0479e90e1e3d65bf94578e312c55d708250b2f018c1f6bb4c1e56788
    container_name: sentinel-tempo
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo HTTP (queries)
      - "4317:4317"   # OTLP gRPC receiver
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - sentinel-network
    restart: unless-stopped

  # ── Flink Stream Processing Jobs ──────────────────────────────────────────

  flink-anomaly-detection:
    build:
      context: ./stream-processing/flink-jobs
      dockerfile: Dockerfile.anomaly
    container_name: sentinel-flink-anomaly
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - FLINK_PARALLELISM=2
      - CHECKPOINT_DIR=file:///tmp/flink-checkpoints/anomaly
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sentinel-network
    restart: unless-stopped

  flink-feature-extraction:
    build:
      context: ./stream-processing/flink-jobs
      dockerfile: Dockerfile.feature
    container_name: sentinel-flink-features
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_INPUT_TOPIC=sentinel-network-events
      - KAFKA_OUTPUT_TOPIC=extracted_features
      - FLINK_PARALLELISM=2
      - CHECKPOINT_DIR=file:///tmp/flink-checkpoints/features
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sentinel-network
    restart: unless-stopped

  flink-drl-feed:
    build:
      context: ./stream-processing/flink-jobs
      dockerfile: Dockerfile.drl-feed
    container_name: sentinel-flink-drl-feed
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DRL_ENGINE_URL=http://drl-engine:5005
      - POLICY_SERVICE_URL=http://policy-orchestrator:5004
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      - FLINK_PARALLELISM=1
      - CHECKPOINT_DIR=file:///tmp/flink-checkpoints/drl-feed
    depends_on:
      kafka:
        condition: service_healthy
      drl-engine:
        condition: service_started
      policy-orchestrator:
        condition: service_started
    networks:
      - sentinel-network
    restart: unless-stopped

networks:
  sentinel-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  es_data:
  ai_models:
  hardening_backups:
  prometheus_data:
  grafana_data:
  tempo_data:
