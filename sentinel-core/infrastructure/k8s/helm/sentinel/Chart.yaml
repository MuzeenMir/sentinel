apiVersion: v2
name: sentinel
description: SENTINEL AI-powered security platform
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - security
  - threat-detection
  - ai
  - ebpf
  - compliance
maintainers:
  - name: SENTINEL Team
dependencies:
  - name: postgresql
    version: "~15"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "~18"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: kafka
    version: "~26"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
