{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "sentinel.fullname" . }}-agent
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: sentinel-agent
          image: {{ include "sentinel.image" (dict "service" .Values.agent "global" .Values) }}
          securityContext:
            {{- toYaml .Values.agent.securityContext | nindent 12 }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SENTINEL_API_URL
              value: "http://{{ include "sentinel.fullname" . }}-api-gateway:{{ .Values.apiGateway.port }}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "sentinel.fullname" . }}-kafka:9092"
            - name: AUTH_SERVICE_URL
              value: "http://{{ include "sentinel.fullname" . }}-auth-service:5000"
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          volumeMounts:
            - name: host-etc
              mountPath: /host/etc
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: bpf-maps
              mountPath: /sys/fs/bpf
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
        - name: host-proc
          hostPath:
            path: /proc
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: bpf-maps
          hostPath:
            path: /sys/fs/bpf
{{- end }}
