{{- if not .Values.vault.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-db-credentials
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgresql.auth.password | required "postgresql.auth.password must be set" | quote }}
  runtime-password: {{ .Values.postgresql.runtime.password | required "postgresql.runtime.password must be set (T-028 sentinel_app runtime role)" | quote }}
  # Migration DSN — sentinel (owner/superuser, BYPASSRLS). Reserved for
  # future migration Job; not consumed by app services.
  connection-string-migration: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "sentinel.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  # Runtime DSN — sentinel_app (NOSUPERUSER NOBYPASSRLS). Consumed by all app
  # services via sentinel.commonEnv DATABASE_URL.
  connection-string: "postgresql://{{ .Values.postgresql.runtime.username }}:{{ .Values.postgresql.runtime.password }}@{{ include "sentinel.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-auth-secrets
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret-key: {{ .Values.auth.jwtSecretKey | required "auth.jwtSecretKey must be set (use --set or values file)" | quote }}
  internal-service-token: {{ .Values.auth.internalServiceToken | required "auth.internalServiceToken must be set (use --set or values file)" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-redis-credentials
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  redis-password: {{ .Values.redis.auth.password | default "" | quote }}
{{- end }}
{{- if .Values.vault.enabled }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sentinel-vault-secrets
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.vault.address | quote }}
    roleName: {{ .Values.vault.role | quote }}
    objects: |
      - objectName: "jwt-secret-key"
        secretPath: {{ .Values.vault.secretPath | quote }}
        secretKey: "jwt_secret_key"
      - objectName: "internal-service-token"
        secretPath: {{ .Values.vault.secretPath | quote }}
        secretKey: "internal_service_token"
      - objectName: "db-password"
        secretPath: {{ .Values.vault.secretPath | quote }}
        secretKey: "db_password"
      - objectName: "db-runtime-password"
        secretPath: {{ .Values.vault.secretPath | quote }}
        secretKey: "db_runtime_password"
      - objectName: "redis-password"
        secretPath: {{ .Values.vault.secretPath | quote }}
        secretKey: "redis_password"
  secretObjects:
    - secretName: sentinel-auth-secrets
      type: Opaque
      data:
        - objectName: jwt-secret-key
          key: jwt-secret-key
        - objectName: internal-service-token
          key: internal-service-token
    - secretName: sentinel-db-credentials
      type: Opaque
      data:
        - objectName: db-password
          key: password
        - objectName: db-runtime-password
          key: runtime-password
{{- end }}
