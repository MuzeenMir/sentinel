apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}-alert-service
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: alert-service
spec:
  replicas: {{ .Values.alertService.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: alert-service
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: alert-service
        app.kubernetes.io/part-of: sentinel
    spec:
      serviceAccountName: {{ include "sentinel.fullname" . }}-alert-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: alert-service
          image: {{ include "sentinel.image" (dict "service" .Values.alertService "global" .Values) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.alertService.port }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "alert-service"
            {{- include "sentinel.commonEnv" . | nindent 12 }}
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: sentinel-smtp-credentials
                  key: host
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: sentinel-smtp-credentials
                  key: port
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: sentinel-smtp-credentials
                  key: username
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-smtp-credentials
                  key: password
                  optional: true
          resources:
            {{- toYaml .Values.alertService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinel.fullname" . }}-alert-service
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: alert-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.alertService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sentinel.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: alert-service
