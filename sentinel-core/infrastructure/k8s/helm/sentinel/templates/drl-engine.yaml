apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}-drl-engine
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: drl-engine
spec:
  replicas: {{ .Values.drlEngine.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: drl-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: drl-engine
        app.kubernetes.io/part-of: sentinel
    spec:
      serviceAccountName: {{ include "sentinel.fullname" . }}-drl-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: drl-engine
          image: {{ include "sentinel.image" (dict "service" .Values.drlEngine "global" .Values) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.drlEngine.port }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "drl-engine"
            {{- include "sentinel.commonEnv" . | nindent 12 }}
            - name: AI_ENGINE_URL
              value: "http://{{ include "sentinel.fullname" . }}-ai-engine:{{ .Values.aiEngine.port }}"
            - name: POLICY_SERVICE_URL
              value: "http://{{ include "sentinel.fullname" . }}-policy-orchestrator:{{ .Values.policyOrchestrator.port }}"
            - name: MODEL_PATH
              value: "/models/drl"
          resources:
            {{- toYaml .Values.drlEngine.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- if .Values.aiEngine.modelVolume.enabled }}
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ include "sentinel.fullname" . }}-ai-models
        {{- else }}
        - name: model-storage
          emptyDir:
            sizeLimit: 10Gi
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinel.fullname" . }}-drl-engine
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: drl-engine
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.drlEngine.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sentinel.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: drl-engine
