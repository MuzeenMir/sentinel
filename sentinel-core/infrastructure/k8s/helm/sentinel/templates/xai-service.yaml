apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}-xai-service
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: xai-service
spec:
  replicas: {{ .Values.xaiService.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: xai-service
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: xai-service
        app.kubernetes.io/part-of: sentinel
    spec:
      serviceAccountName: {{ include "sentinel.fullname" . }}-xai-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: xai-service
          image: {{ include "sentinel.image" (dict "service" .Values.xaiService "global" .Values) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.xaiService.port }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "xai-service"
            {{- include "sentinel.commonEnv" . | nindent 12 }}
            - name: AI_ENGINE_URL
              value: "http://{{ include "sentinel.fullname" . }}-ai-engine:{{ .Values.aiEngine.port }}"
            - name: DRL_ENGINE_URL
              value: "http://{{ include "sentinel.fullname" . }}-drl-engine:{{ .Values.drlEngine.port }}"
          resources:
            {{- toYaml .Values.xaiService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinel.fullname" . }}-xai-service
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: xai-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.xaiService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sentinel.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: xai-service
