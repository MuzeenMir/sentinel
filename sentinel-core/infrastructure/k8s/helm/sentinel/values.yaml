# SENTINEL Helm Chart - Default Values
# Override per environment (values-dev.yaml, values-prod.yaml)

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# ── Namespace & labels ───────────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

# ── Image defaults ───────────────────────────────────────────────────
image:
  registry: ghcr.io
  repository: sentinel
  pullPolicy: IfNotPresent
  tag: "latest"

# ── Auth Service ─────────────────────────────────────────────────────
authService:
  replicaCount: 2
  image:
    name: auth-service
  port: 5000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    JWT_ACCESS_EXPIRES_HOURS: "24"
    JWT_REFRESH_EXPIRES_DAYS: "30"

# ── API Gateway ──────────────────────────────────────────────────────
apiGateway:
  replicaCount: 2
  image:
    name: api-gateway
  port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/rate-limit: "100"
    hosts:
      - host: sentinel.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: sentinel-tls
        hosts:
          - sentinel.example.com

# ── AI Engine ────────────────────────────────────────────────────────
aiEngine:
  replicaCount: 1
  image:
    name: ai-engine
  port: 5003
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  modelVolume:
    enabled: true
    size: 10Gi
    storageClass: ""

# ── DRL Engine ───────────────────────────────────────────────────────
drlEngine:
  replicaCount: 1
  image:
    name: drl-engine
  port: 5005
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

# ── Policy Orchestrator ──────────────────────────────────────────────
policyOrchestrator:
  replicaCount: 2
  image:
    name: policy-orchestrator
  port: 5004
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Alert Service ────────────────────────────────────────────────────
alertService:
  replicaCount: 2
  image:
    name: alert-service
  port: 5002
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Compliance Engine ────────────────────────────────────────────────
complianceEngine:
  replicaCount: 1
  image:
    name: compliance-engine
  port: 5007
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── XAI Service ──────────────────────────────────────────────────────
xaiService:
  replicaCount: 1
  image:
    name: xai-service
  port: 5006
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Data Collector ──────────────────────────────────────────────────
dataCollector:
  replicaCount: 1
  image:
    name: data-collector
  port: 5001
  hostNetwork: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Hardening Service ────────────────────────────────────────────────
hardeningService:
  replicaCount: 1
  image:
    name: hardening-service
  port: 5011
  securityContext:
    privileged: true

# ── Admin Console (Frontend) ─────────────────────────────────────────
adminConsole:
  replicaCount: 2
  image:
    name: admin-console
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Sentinel Agent (DaemonSet) ───────────────────────────────────────
agent:
  enabled: true
  image:
    name: sentinel-agent
  securityContext:
    privileged: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Auth secrets (required — override via --set or values-prod.yaml) ──
auth:
  jwtSecretKey: ""  # REQUIRED: set via --set auth.jwtSecretKey=<value>

# ── External Dependencies ────────────────────────────────────────────

postgresql:
  enabled: true
  auth:
    database: sentinel_db
    username: sentinel
    password: ""  # REQUIRED: set via --set postgresql.auth.password=<value>
    existingSecret: sentinel-db-credentials
  primary:
    persistence:
      size: 50Gi

redis:
  enabled: true
  architecture: replication
  auth:
    existingSecret: sentinel-redis-credentials

kafka:
  enabled: true
  replicaCount: 3
  persistence:
    size: 50Gi

# ── Observability ────────────────────────────────────────────────────
observability:
  opentelemetry:
    enabled: true
    collectorEndpoint: "http://otel-collector:4317"
  prometheus:
    enabled: true
    serviceMonitor: true
  grafana:
    enabled: false

# ── Secrets (Vault integration) ──────────────────────────────────────
vault:
  enabled: false
  address: "https://vault.example.com"
  role: "sentinel"
  secretPath: "secret/data/sentinel"
