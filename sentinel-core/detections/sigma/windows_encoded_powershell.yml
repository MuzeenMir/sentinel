id: sentinel.sigma.windows.encoded_powershell
title: Encoded PowerShell command
status: experimental
description: Detects PowerShell invocations using encoded command arguments.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - \powershell.exe
      - \pwsh.exe
    CommandLine|contains:
      - -EncodedCommand
      - -enc
  condition: selection
level: medium
tags:
  - attack.execution
  - attack.t1059.001
