id: sentinel.sigma.auth.privilege_escalation
title: User added to privileged group
status: experimental
description: Detects group membership changes that grant administrative privileges.
logsource:
  product: linux
  category: authentication
detection:
  selection:
    event.action:
      - user_added_to_group
      - group_membership_changed
    group.name:
      - sudo
      - wheel
      - admin
  condition: selection
level: critical
tags:
  - attack.privilege_escalation
  - attack.t1098
