name: ✨ Feature request
description: Propose a new capability or an improvement.
title: "feat: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Proposals are welcome. For open-ended ideas or "would it make sense to…"
        questions, prefer [Discussions](https://github.com/MuzeenMir/sentinel/discussions);
        use this form when you have a concrete, scoped request.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who is affected and when?
      placeholder: As an operator, I can't ... which means ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Sketch the behavior, not necessarily the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you set them aside.
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap phase
      description: Where does this fit? (See CLAUDE.md / revamp docs. Unsure is fine.)
      options:
        - Phase 0 (stabilize)
        - Phase 1 (consolidate)
        - Phase 2+ (future)
        - Not part of revamp — normal maintenance
        - Unsure
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Hard-constraint awareness
      description: These are non-negotiable project rules; check any your request touches so reviewers know.
      options:
        - label: My request does NOT let LLM output reach enforcement adapters without human approval.
        - label: My request does NOT weaken the append-only audit log or multi-tenant RLS isolation.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues/Discussions and this is not a duplicate.
          required: true
