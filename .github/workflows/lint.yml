name: lint

# Conventional Commits gate. Backend (ruff) + frontend (eslint/prettier)
# jobs were dropped with the v1 sentinel-core/ archive; reintroduce
# language-specific lint as the Rust skeleton (cargo fmt, clippy) and any
# new JS/Python surfaces land.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-commitlint:
    name: lint-commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli@20.5.2 \
            @commitlint/config-conventional@20.5.0
      - name: Validate PR commits
        run: |
          npx commitlint \
            --from="$BASE_SHA" \
            --to="$HEAD_SHA" \
            --verbose

  lint:
    name: lint
    needs: [lint-commitlint]
    if: always()
    runs-on: ubuntu-latest
    env:
      COMMITLINT_RESULT: ${{ needs.lint-commitlint.result }}
    steps:
      - name: Aggregate
        run: |
          # commitlint only runs on PRs. On push events it is skipped, which
          # is acceptable — push to main has already passed PR-time commitlint.
          if [ "$COMMITLINT_RESULT" = "failure" ] || [ "$COMMITLINT_RESULT" = "cancelled" ]; then
            echo "::error::lint failed (commitlint=$COMMITLINT_RESULT)"
            exit 1
          fi
          echo "lint green (commitlint=$COMMITLINT_RESULT)"
