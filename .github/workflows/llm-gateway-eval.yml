name: llm-gateway-eval

# Dedicated, isolated CI for the LLM analyst copilot (Wedge #2).
# NOTE: this is a NEW workflow file; it intentionally does not modify any
# existing workflow (Phase-2 independence contract — Claude owns only this file).
#
# SCOPE (audit CI-03): the eval step is PLUMBING ONLY. It runs the eval harness
# against a deterministic reference stub (evals/run.py::_reference_runner) to
# prove the harness + thresholds wire up — it does NOT exercise a live model and
# is NOT a quality gate. The real quality eval (live/local provider) is run
# manually/nightly and its residuals are published in ADR-022. Do not promote
# this step to a required check as if it measured model quality.

on:
  pull_request:
    paths:
      - "sentinel-core/backend/llm-gateway/**"
      - ".github/workflows/llm-gateway-eval.yml"
  push:
    branches: [main]
    paths:
      - "sentinel-core/backend/llm-gateway/**"

jobs:
  llm-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core/backend/llm-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Pin ruff to the repo standard (the required `lint` gate uses 0.5.6).
          # Unpinned ruff floated to a newer release whose formatter disagrees
          # with 0.5.6 — a non-deterministic check, not a real defect.
          pip install pytest ruff==0.5.6
      - name: Ruff lint + format check
        run: |
          ruff check .
          ruff format --check .
      - name: Unit + eval-harness tests
        run: python -m pytest tests -q
      - name: Eval harness plumbing smoke (stub runner, NOT a model quality gate)
        run: python -m evals.run
