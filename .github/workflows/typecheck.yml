name: typecheck

# mypy (backend) + tsc --noEmit (frontend, strict).
# Phase 0: mypy runs with --ignore-missing-imports; strict mode tightens in
# Phase 1 as services move into backend/_lib/ and the new consolidated layout.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: typecheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-backend:
    name: typecheck-backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install mypy + stubs
        run: |
          pip install \
            mypy==1.11.1 \
            pydantic==2.8.2 \
            types-requests types-PyYAML types-redis
      - name: mypy
        run: |
          mypy \
            --ignore-missing-imports \
            --python-version 3.12 \
            --no-incremental \
            sentinel-core/backend

  typecheck-frontend:
    name: typecheck-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sentinel-core/frontend/admin-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sentinel-core/frontend/admin-console/package-lock.json
      - run: npm ci
      - name: tsc --noEmit (strict)
        run: npm run type-check

  typecheck:
    name: typecheck
    needs: [typecheck-backend, typecheck-frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "typecheck green"
