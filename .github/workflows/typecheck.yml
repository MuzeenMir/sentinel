name: typecheck

# mypy (backend) + tsc --noEmit (frontend, strict).
# Phase 0: mypy runs with --ignore-missing-imports; strict mode tightens in
# Phase 1 as services move into backend/_lib/ and the new consolidated layout.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: typecheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-backend:
    name: typecheck-backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install mypy + stubs
        run: |
          pip install \
            mypy==1.11.1 \
            pydantic==2.8.2 \
            types-requests types-PyYAML types-redis
      - name: mypy (Phase 0 allowlist)
        run: |
          set -euo pipefail
          # Phase 0 scope: only dirs that currently pass mypy run in the gate.
          # Each service owns its own app.py, so we can't scan the full
          # backend/ tree in one call (mypy would report duplicate "app" module).
          # Legacy services with type-debt (ai-engine, alert-service, auth-service,
          # data-collector, drl-engine, policy-orchestrator, tests, etc.) get
          # folded in as Phase 1 consolidates code into backend/_lib/.
          ALLOWLIST=(
            sentinel-core/backend/shared
            sentinel-core/backend/plugins
            sentinel-core/backend/migrations
            sentinel-core/backend/compliance-engine
            sentinel-core/backend/xai-service
            sentinel-core/backend/hids-agent
          )
          failed=0
          for d in "${ALLOWLIST[@]}"; do
            echo "::group::mypy $(basename "$d")"
            mypy \
              --ignore-missing-imports \
              --python-version 3.12 \
              --no-incremental \
              "$d" || failed=$?
            echo "::endgroup::"
          done
          exit "$failed"

  typecheck-frontend:
    name: typecheck-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sentinel-core/frontend/admin-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sentinel-core/frontend/admin-console/package-lock.json
      - run: npm ci
      - name: tsc --noEmit (strict)
        run: npm run type-check

  typecheck:
    name: typecheck
    needs: [typecheck-backend, typecheck-frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "typecheck green"
