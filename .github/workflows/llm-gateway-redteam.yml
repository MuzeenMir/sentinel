name: llm-gateway-redteam

# Defensive-coverage gate for the LLM analyst copilot pattern detectors
# (Wedge #2, Plan CLAUDE C1). Scope: asserts the safety/grounding/tool-arg
# detectors neutralize a fixed adversarial corpus — including a HELD-OUT set of
# paraphrases not present in safety._INJECTION_PATTERNS, so the gate cannot pass
# by the corpus matching itself (audit CI-02). This is NOT a live-model
# adversarial evaluation; real model robustness is an ungated nightly/manual
# exercise. The gate fails closed if any corpus attack slips through, and
# publishes the residual. NEW workflow file; it does not modify any existing
# workflow (independence contract — Claude owns only the llm-gateway-*.yml files).

on:
  pull_request:
    paths:
      - "sentinel-core/backend/llm-gateway/**"
      - ".github/workflows/llm-gateway-redteam.yml"
  push:
    branches: [main]
    paths:
      - "sentinel-core/backend/llm-gateway/**"

jobs:
  redteam:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core/backend/llm-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Red-team gate (fail-closed; publishes residual)
        run: python redteam.py
      - name: Red-team + safety tests
        run: python -m pytest tests/test_redteam.py tests/test_safety.py -q
