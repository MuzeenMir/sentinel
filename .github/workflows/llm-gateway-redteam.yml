name: llm-gateway-redteam

# Adversarial red-team gate for the LLM analyst copilot (Wedge #2, Plan CLAUDE C1).
# NEW workflow file; it does not modify any existing workflow (independence
# contract — Claude owns only the llm-gateway-*.yml files). The gate fails closed
# if ANY attack in the corpus slips through, and publishes the residual.

on:
  pull_request:
    paths:
      - "sentinel-core/backend/llm-gateway/**"
      - ".github/workflows/llm-gateway-redteam.yml"
  push:
    branches: [main]
    paths:
      - "sentinel-core/backend/llm-gateway/**"

jobs:
  redteam:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core/backend/llm-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Red-team gate (fail-closed; publishes residual)
        run: python redteam.py
      - name: Red-team + safety tests
        run: python -m pytest tests/test_redteam.py tests/test_safety.py -q
