name: security

# Repo-generic security gates that survive the v1 archive.
# Python/Node-specific scans (pip-audit, bandit, npm-audit, semgrep python/ts,
# CodeQL, auth-tests, ZAP DAST) were dropped with sentinel-core/ removal in
# PR T1-2; reintroduce per-language jobs as the Rust skeleton (and any new
# Python/JS surfaces) lands.
#
# Aggregator job `security` retained for branch protection compatibility.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  security-gitleaks:
    name: security-gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  security-trivy:
    name: security-trivy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: '1'
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  security:
    name: security
    needs:
      - security-gitleaks
      - security-trivy
    runs-on: ubuntu-latest
    steps:
      - run: echo "security green"
