name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Opt every action on this workflow into Node.js 24 ahead of the
# forced cutover (Sep 2026). Silences the Node 20 deprecation warning
# emitted by actions/checkout@v4, actions/setup-node@v4, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core/frontend/admin-console
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sentinel-core/frontend/admin-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core/frontend/admin-console
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sentinel-core/frontend/admin-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install service deps (for tests that import service modules)
        run: |
          pip install \
            -r hardening-service/requirements.txt \
            -r hids-agent/requirements.txt \
            -r ai-engine/requirements.txt \
            -r auth-service/requirements.txt \
            -r api-gateway/requirements.txt \
            -r drl-engine/requirements.txt

      - name: Run backend tests
        run: python -m pytest tests/ --ignore=tests/test_e2e_pipeline.py -v --tb=short

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python audit tools
        run: pip install pip-audit bandit

      - name: pip-audit (auth-service)
        run: pip-audit -r sentinel-core/backend/auth-service/requirements.txt

      - name: pip-audit (ai-engine)
        run: pip-audit -r sentinel-core/backend/ai-engine/requirements.txt

      - name: Bandit (backend Python)
        run: |
          bandit -r sentinel-core/backend/ \
            --exclude sentinel-core/backend/.venv-backend \
            -ll -ii \
            --format json \
            --output bandit-report.json || true
          python -c "
          import json, sys
          try:
              with open('bandit-report.json') as f:
                  data = json.load(f)
          except FileNotFoundError:
              data = {'results': []}
          results = data.get('results', [])
          high = [r for r in results if r.get('issue_severity') == 'HIGH']
          if high:
              print(f'::error::Bandit found {len(high)} HIGH severity issue(s); job failed.', file=sys.stderr)
              for h in high[:10]:
                  print(f'  {h[\"filename\"]}:{h[\"line_number\"]} - {h[\"issue_text\"]}', file=sys.stderr)
              sys.exit(1)
          print('No HIGH severity issues found')
          "

      - name: npm audit (frontend)
        working-directory: sentinel-core/frontend/admin-console
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore

  auth-security-tests:
    name: Auth Security Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt
          pip install -r auth-service/requirements.txt

      - name: Run auth security tests
        run: python -m pytest tests/test_auth_security.py -v --tb=short

  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        working-directory: sentinel-core
        run: |
          docker compose up -d --build api-gateway auth-service redis postgres
          sleep 30

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.github/zap-rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false

      - name: Stop stack
        if: always()
        working-directory: sentinel-core
        run: docker compose down -v

  training:
    name: Training pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core
    steps:
      - uses: actions/checkout@v4

      - name: Check for training requirements and data
        id: check-training
        run: |
          if [ ! -f training/requirements.txt ]; then echo "run=false" >> $GITHUB_OUTPUT; exit 0; fi
          if [ -d training/datasets/data/cicids2018 ] && [ -n "$(ls -A training/datasets/data/cicids2018 2>/dev/null)" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Training data not present (training/datasets/data/cicids2018); skipping training pipeline."
          fi

      - name: Skip (no training files or data)
        if: steps.check-training.outputs.run != 'true'
        run: echo "Training requirements or dataset not present; skipping training job."

      - name: Setup Python
        if: steps.check-training.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install training dependencies
        if: steps.check-training.outputs.run == 'true'
        run: pip install -r training/requirements.txt

      - name: Run training (xgboost + isolation_forest, max 5000 rows)
        if: steps.check-training.outputs.run == 'true'
        run: |
          python -m training.train_all \
            --data-path training/datasets/data \
            --dataset cicids2018 \
            --models xgboost isolation_forest \
            --max-rows 5000 \
            --device cpu

      - name: Check artifacts
        if: steps.check-training.outputs.run == 'true'
        run: |
          test -f backend/ai-engine/trained_models/xgboost/xgboost_model.json
          test -f backend/ai-engine/trained_models/isolation_forest/isolation_forest.joblib

      - name: Run model validation gate
        if: steps.check-training.outputs.run == 'true'
        run: |
          python training/validate_models.py \
            --model-path backend/ai-engine/trained_models

      - name: Upload validation report
        if: steps.check-training.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: model-validation-report
          path: sentinel-core/backend/ai-engine/trained_models/validation_report.json
          if-no-files-found: ignore

      - name: Verify SageMaker inference.py exists
        run: |
          test -f training/inference.py || (echo "::error::training/inference.py is missing" && exit 1)

  performance:
    name: Performance Micro-benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-core/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt
          pip install scikit-learn numpy

      - name: Run micro-benchmarks
        run: python -m pytest tests/performance/test_microbench.py -v --tb=short

  e2e-smoke:
    name: E2E smoke (compose up + login + API call)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: sentinel-core
    env:
      JWT_SECRET_KEY: ci-smoke-not-a-real-secret-do-not-reuse
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin@123!SmokeTest
      ADMIN_EMAIL: admin@example.com
      POSTGRES_PASSWORD: smoke_pg_password
      DRL_SHADOW_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      # .env is gitignored, so Compose variable substitution falls back to
      # defaults that do not match what the CI job expects. Materialize a
      # CI-scoped .env that mirrors this job's env block so every service
      # (db-migrate included) sees identical credentials and hostnames.
      - name: Write CI .env for docker compose
        run: |
          cat > .env <<EOF
          POSTGRES_USER=sentinel
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=sentinel_db
          POSTGRES_HOST=sentinel-postgres
          POSTGRES_PORT=5432
          DATABASE_URL=postgresql://sentinel:${POSTGRES_PASSWORD}@sentinel-postgres:5432/sentinel_db
          JWT_SECRET_KEY=${JWT_SECRET_KEY}
          ADMIN_USERNAME=${ADMIN_USERNAME}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          DRL_SHADOW_MODE=${DRL_SHADOW_MODE}
          EOF
          echo "::group::.env contents (password redacted)"
          sed 's/\(PASSWORD=\).*/\1***/' .env
          echo "::endgroup::"

      - name: Build images used by the smoke stack
        run: |
          docker compose build \
            postgres redis db-migrate auth-service api-gateway \
            ai-engine drl-engine policy-orchestrator alert-service

      - name: Start Postgres + Redis only
        run: docker compose up -d postgres redis

      - name: Wait for Postgres to accept connections (pg_isready + drain)
        run: |
          # Postgres' healthcheck can flip to "healthy" while init scripts
          # (init.sql) are still running in the background. Poll with
          # pg_isready against the target database, then sleep to cover
          # any residual init.sql writes before migrations fire.
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U sentinel -d sentinel_db >/dev/null 2>&1; then
              echo "postgres ready after ${i} attempts"
              break
            fi
            sleep 2
          done
          sleep 5

      - name: Run database migrations (foreground, propagate exit code)
        run: |
          # Foreground up with --exit-code-from makes the step fail with
          # db-migrate's actual exit code (not a silent background crash)
          # and streams alembic stdout directly into the workflow log.
          docker compose up \
            --exit-code-from db-migrate \
            --abort-on-container-exit \
            db-migrate

      - name: Dump db-migrate + postgres logs on failure
        if: failure()
        run: |
          echo "::group::sentinel-db-migrate logs"
          docker compose logs db-migrate || true
          echo "::endgroup::"
          echo "::group::sentinel-postgres logs"
          docker compose logs postgres || true
          echo "::endgroup::"
          echo "::group::docker compose ps"
          docker compose ps || true
          echo "::endgroup::"

      - name: Bring up remaining services
        run: |
          docker compose up -d \
            auth-service api-gateway \
            ai-engine drl-engine policy-orchestrator alert-service

      - name: Wait for api-gateway healthy (max 120s)
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "gateway healthy after ${i} attempts"; exit 0
            fi
            sleep 2
          done
          echo "::error::api-gateway never became healthy"
          docker compose logs api-gateway auth-service postgres
          exit 1

      - name: Login + capture token
        id: login
        run: |
          set -e
          RESP=$(curl -sf -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${ADMIN_USERNAME}\",\"password\":\"${ADMIN_PASSWORD}\"}")
          TOKEN=$(echo "$RESP" | python -c "import sys,json;print(json.load(sys.stdin)['access_token'])")
          if [ -z "$TOKEN" ]; then echo "::error::no token in login response: $RESP"; exit 1; fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Authenticated GET /api/v1/threats
        run: |
          curl -sf -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            http://localhost:8080/api/v1/threats | head -c 500

      - name: Authenticated GET /api/v1/statistics
        run: |
          curl -sf -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            http://localhost:8080/api/v1/statistics

      - name: DRL shadow-mode sanity (decision NOT enforced)
        run: |
          DEC=$(curl -sf -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json" \
            -X POST http://localhost:8080/api/v1/drl/decide \
            -d '{"detection_id":"smoke","threat_score":0.95,"threat_type":"brute_force","source_ip":"1.2.3.4","dest_port":22,"protocol":"TCP","asset_criticality":3}' || true)
          echo "$DEC"
          echo "$DEC" | python -c "import sys,json;d=json.load(sys.stdin);assert d.get('shadow') is True, d"

      - name: Tear down
        if: always()
        run: docker compose down -v
