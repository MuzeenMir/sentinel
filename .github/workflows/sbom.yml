name: sbom

# SBOM (SPDX JSON via Syft) + cosign keyless OIDC signing.
# On PR: generate SBOM from source (repo filesystem) as artifact, no signing.
# On push to main/tag: generate SBOM per pushed image + cosign sign the image
#   digest and the SBOM attestation (SLSA-style provenance).
#
# Registry creds come from GITHUB_TOKEN; Fulcio/Rekor OIDC from workflow id-token.

on:
  # PR path: source SBOM only. Main/tag path: runs after `build` completes so
  # the per-service digest artifacts it uploads are available to sbom-images.
  # A direct `push:` trigger is intentionally omitted — it would race `build`
  # and fail before digests exist.
  pull_request:
    branches: [main]
  workflow_run:
    workflows: ['build']
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

concurrency:
  group: sbom-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write      # cosign writes signatures as OCI artifacts in the same registry
  id-token: write      # Fulcio OIDC
  attestations: write

jobs:
  sbom-source:
    # PR path — no image exists yet to sign. Just produce an SBOM artifact for
    # the repo filesystem and block if HIGH-severity license or secrets are found.
    name: sbom-source
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 14

  sbom-images:
    name: sbom-images
    # Only run after `build` workflow_run succeeded. Skip on PR (no pushed image).
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - ai-engine
          - alert-service
          - api-gateway
          - auth-service
          - compliance-engine
          - data-collector
          - drl-engine
          - hardening-service
          - hids-agent
          - policy-orchestrator
          - xai-service
          - xdp-collector
          - admin-console
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.0
      - name: Download image digest
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ matrix.service }}
          path: /tmp/digests
          # Pull from the `build` run that triggered this workflow_run.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Resolve image reference
        id: ref
        run: |
          # OCI reference parser requires lowercase repo path; GHCR is case-
          # insensitive but Syft's go-containerregistry parser rejects uppercase.
          OWNER_LC="$(echo "${{ env.IMAGE_OWNER }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${{ env.REGISTRY }}/${OWNER_LC}/sentinel-${{ matrix.service }}"
          DIGEST="$(cat /tmp/digests/${{ matrix.service }}.digest | tr -d '[:space:]')"
          if [ -z "$DIGEST" ]; then
            echo "::error::no digest recorded for ${{ matrix.service }}"
            exit 1
          fi
          echo "image=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image_plain=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.14.0
      - name: Syft SBOM (SPDX JSON)
        # Invoke syft directly. The anchore/sbom-action@v0 does not reliably
        # pick up the docker/login-action credentials for ghcr.io pulls of
        # private packages; `syft` CLI honors ~/.docker/config.json written
        # by docker/login-action.
        run: |
          syft scan \
            "registry:${{ steps.ref.outputs.image }}" \
            -o spdx-json="sbom-${{ matrix.service }}.spdx.json"
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90
      - name: Cosign sign image (keyless OIDC via Fulcio)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes "${{ steps.ref.outputs.image }}"
      - name: Cosign attest SBOM (in-toto predicate)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.service }}.spdx.json \
            --type spdxjson \
            "${{ steps.ref.outputs.image }}"
      - name: Verify signature
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/.+@refs/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${{ steps.ref.outputs.image }}"

  sbom:
    name: sbom
    # Aggregator is green when either PR source SBOM OR image SBOM+sign succeeded.
    needs: [sbom-source, sbom-images]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ needs.sbom-source.result }}" != "success" ]; then
              echo "::error::sbom-source failed"; exit 1
            fi
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ needs.sbom-images.result }}" != "success" ]; then
              echo "::error::sbom-images failed"; exit 1
            fi
          fi
          echo "sbom green"
