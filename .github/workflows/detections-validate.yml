name: detections-validate

on:
  # No path filter (audit CI-08 / Wave B1): this is now a REQUIRED check, so it
  # must report a status on EVERY PR. A path-filtered required check never
  # reports on PRs that don't touch the filtered paths and would block them
  # forever. The job is lightweight — it validates the committed detection
  # content and runs the detection unit tests regardless of what changed.
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: detections-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detections-validate:
    name: detections-validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install validation deps
        run: pip install pytest==9.0.3 PyYAML==6.0.1 requests==2.31.0
      - name: Validate detection content
        run: python sentinel-core/scripts/validate_detections.py
      - name: Detection unit tests
        working-directory: sentinel-core/backend
        run: python -m pytest tests/test_detection_engine.py tests/test_validate_detections.py tests/test_detection_rules.py -q
