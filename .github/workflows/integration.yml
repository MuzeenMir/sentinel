name: integration

# docker-compose-based integration tests + fresh-DB Alembic idempotency probe.
# Integration suite lives under sentinel-core/tests/ (non-e2e slice — that is
# in e2e-smoke.yml).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-migrations:
    # Prove migrations are idempotent on a fresh database
    # (upgrade → downgrade → upgrade). Wired by Phase 0 slice 3.
    name: integration-migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Alembic + psycopg
        run: pip install alembic==1.13.2 'psycopg[binary]==3.2.1' SQLAlchemy==2.0.32
      - name: fresh_db_check
        run: bash scripts/fresh_db_check.sh

  integration-compose:
    # Spin up the compose stack (core services only), run the integration
    # test slice, tear down. Separate from e2e-smoke (which does end-to-end
    # login + authenticated API calls).
    name: integration-compose
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: sentinel-core
    env:
      JWT_SECRET_KEY: ci-integration-not-a-real-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin@123!IntegrationCI
      ADMIN_EMAIL: admin@example.com
      POSTGRES_PASSWORD: integration_pg_password
      DRL_SHADOW_MODE: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Write CI .env
        run: |
          cat > .env <<EOF
          POSTGRES_USER=sentinel
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=sentinel_db
          POSTGRES_HOST=sentinel-postgres
          POSTGRES_PORT=5432
          DATABASE_URL=postgresql://sentinel:${POSTGRES_PASSWORD}@sentinel-postgres:5432/sentinel_db
          JWT_SECRET_KEY=${JWT_SECRET_KEY}
          ADMIN_USERNAME=${ADMIN_USERNAME}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          DRL_SHADOW_MODE=${DRL_SHADOW_MODE}
          EOF
      - name: Build core images
        run: |
          docker compose build \
            postgres redis db-migrate auth-service api-gateway
      - name: Start Postgres + Redis
        run: docker compose up -d postgres redis
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U sentinel -d sentinel_db >/dev/null 2>&1; then
              echo "postgres ready after ${i} attempts"; break
            fi
            sleep 2
          done
          sleep 5
      - name: Apply migrations (foreground)
        run: |
          docker compose up \
            --exit-code-from db-migrate \
            --abort-on-container-exit \
            db-migrate
      - name: Dump logs on migration failure
        if: failure()
        run: |
          docker compose logs db-migrate || true
          docker compose logs postgres || true
      - name: Bring up auth + api-gateway
        run: docker compose up -d auth-service api-gateway
      - name: Install Python integration test deps
        working-directory: sentinel-core/backend
        run: |
          pip install -r requirements-test.txt
          pip install requests
      - name: Run integration slice
        working-directory: sentinel-core/backend
        env:
          INTEGRATION_BASE_URL: http://localhost:8080
          ADMIN_USERNAME: ${{ env.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}
        run: |
          # Integration tests are marked with -m integration; skip when absent.
          if python -m pytest tests/ -m integration --collect-only -q 2>/dev/null | grep -q '::'; then
            python -m pytest tests/ -m integration -v --tb=short
          else
            echo "no integration-marked tests found; skipping"
          fi
      - name: Tear down
        if: always()
        run: docker compose down -v

  integration:
    name: integration
    needs: [integration-migrations, integration-compose]
    runs-on: ubuntu-latest
    steps:
      - run: echo "integration green"
