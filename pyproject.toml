[tool.ruff]
target-version = "py312"
extend-exclude = [
    ".test-venv",
    ".venv",
    "venv",
    "compiled",
    "node_modules",
    "__pycache__",
    "*.egg-info",
]

[tool.ruff.lint.per-file-ignores]
# Re-export modules: unused imports are the API surface.
"**/__init__.py" = ["F401"]
# Tests commonly patch sys.path before local imports.
"**/tests/**/*.py" = ["E402"]
"**/conftest.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
no_incremental = true
explicit_package_bases = true
namespace_packages = true
exclude = '(^|/)(\.test-venv|\.venv|venv|compiled|__pycache__|node_modules)(/|$)'
