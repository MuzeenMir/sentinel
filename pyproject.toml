[tool.ruff]
target-version = "py312"
extend-exclude = [
    ".test-venv",
    ".venv",
    "venv",
    "sentinel_env",
    "compiled",
    "node_modules",
    "__pycache__",
    "*.egg-info",
]

[tool.ruff.lint.per-file-ignores]
# Re-export modules: unused imports are the API surface.
"**/__init__.py" = ["F401"]
# Tests commonly patch sys.path before local imports.
"**/tests/**/*.py" = ["E402"]
"**/conftest.py" = ["E402"]
# PyFlink jobs configure env before importing flink modules.
"**/stream-processing/flink-jobs/**/*.py" = ["E402"]
# Availability probes (optional deps): imports checked via ImportError.
"**/backend/metrics.py" = ["F401"]
"**/backend/shared/metrics.py" = ["F401"]
# Bootstrap block runs sys.path manipulation before later imports.
"**/backend/auth-service/app.py" = ["E402"]
"**/backend/hardening-service/app.py" = ["E402"]
# Training entrypoint: conditional torch import + sys.path shim.
"**/training/train_all.py" = ["E402", "F401"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
no_incremental = true
explicit_package_bases = true
namespace_packages = true
exclude = '(^|/)(ebpf-lib|firewall-adapters|\.test-venv|\.venv|venv|sentinel_env|compiled|__pycache__|node_modules)(/|$)'

# Coverage omit set. sentinel-core/backend/.coveragerc holds the intended
# rules, but the unit-backend CI job runs coverage from the repo root (it must,
# to also collect agent/tests), so that nested .coveragerc is never loaded.
# These rules mirror it here, repo-root-relative, so the line-rate reflects
# production code rather than scaffolding the job does not exercise:
#   - plugins/examples/*    — sample plugin code, not shipped.
#   - migrations/versions/* — Alembic migrations, run-once generated files.
#   - tests/performance/*   — benchmarks + load tests, run by the unit-perf job.
#   - test_e2e_pipeline.py  — needs a live stack; --ignore'd by unit-backend.
[tool.coverage.run]
omit = [
    "*/__pycache__/*",
    "*/site-packages/*",
    "*/plugins/examples/*",
    "*/migrations/versions/*",
    "*/tests/performance/*",
    "*/tests/test_e2e_pipeline.py",
]

[tool.coverage.report]
omit = [
    "*/__pycache__/*",
    "*/site-packages/*",
    "*/plugins/examples/*",
    "*/migrations/versions/*",
    "*/tests/performance/*",
    "*/tests/test_e2e_pipeline.py",
]
