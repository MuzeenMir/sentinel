# Production overrides for Dragon Scale
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Ensure .env.production or env file sets JWT_SECRET_KEY, ADMIN_PASSWORD, etc.

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Do not expose postgres port on host in production (remove ports or bind to 127.0.0.1 only)
    ports: []
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 512M

  auth-service:
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      DATABASE_URL: postgresql://dragon-scale:${POSTGRES_PASSWORD}@postgres:5432/dragon_scale_db
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api-gateway:
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
    ports: []
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin-console:
    environment:
      DRAGON_SCALE_DEMO_AUTH: "false"
      DRAGON_SCALE_ENV: production
    ports: []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  ai-engine:
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  alert-service:
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL}

  elasticsearch:
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    deploy:
      resources:
        limits:
          memory: 2G

  reverse-proxy:
    image: nginx:1.25-alpine
    container_name: dragon-scale-reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./reverse-proxy/certs:/etc/nginx/certs:ro
    depends_on:
      - admin-console
      - api-gateway
    networks:
      - dragon-scale-network
    restart: unless-stopped
