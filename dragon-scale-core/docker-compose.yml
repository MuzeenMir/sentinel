services:
  # PostgreSQL database with health check
  postgres:
    image: postgres:13
    container_name: dragon-scale-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dragon-scale}
      POSTGRES_USER: ${POSTGRES_USER:-dragon-scale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dragon_scale_password}
    ports:
      - "5433:5432"  # host 5433 to avoid conflict with local PostgreSQL on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dragon-scale-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragon-scale"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: dragon-scale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - dragon-scale-network

  # Database migrations (runs once before auth-service starts)
  db-migrate:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: dragon-scale-db-migrate
    environment:
      # Point at the Postgres service via its Docker network hostname
      # (container_name). Must not be `localhost` — that would resolve
      # to the db-migrate container itself inside the Compose network.
      - POSTGRES_HOST=dragon-scale-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-dragon-scale}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dragon_scale_password}
      - POSTGRES_DB=${POSTGRES_DB:-dragon-scale}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dragon-scale}:${POSTGRES_PASSWORD:-dragon_scale_password}@dragon-scale-postgres:5432/${POSTGRES_DB:-dragon-scale}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dragon-scale-network
    working_dir: /app/migrations
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

  # Authentication service with dependency
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: dragon-scale-auth-service
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dragon-scale}:${POSTGRES_PASSWORD:-dragon_scale_password}@postgres:5432/${POSTGRES_DB:-dragon-scale}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMe!2026}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@yourdomain.com}
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # Kafka for message queuing
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: dragon-scale-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - dragon-scale-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dragon-scale-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - dragon-scale-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # API Gateway
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: dragon-scale-api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5000
      - DATA_COLLECTOR_URL=http://data-collector:5001
      - ALERT_SERVICE_URL=http://alert-service:5002
      - POLICY_SERVICE_URL=http://policy-orchestrator:5004
      - COMPLIANCE_ENGINE_URL=http://compliance-engine:5007
      - XAI_SERVICE_URL=http://xai-service:5006
      - AI_ENGINE_URL=http://ai-engine:5003
      - DRL_ENGINE_URL=http://drl-engine:5005
      - HARDENING_SERVICE_URL=http://hardening-service:5011
      - HIDS_AGENT_URL=http://hids-agent:5010
      - REDIS_URL=redis://redis:6379
      # Phase 0 slice 5 — OTel pilot. Empty = telemetry disabled (no-op).
      # Set to `http://tempo:4317` (or an OTLP collector) to enable. Start the
      # `observability` profile locally: `docker compose --profile observability up`.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=api-gateway
    depends_on:
      - auth-service
      - data-collector
      - alert-service
      - policy-orchestrator
      - compliance-engine
      - xai-service
      - hardening-service
      - hids-agent
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # Data Collector
  data-collector:
    build:
      context: ./backend
      dockerfile: data-collector/Dockerfile
    container_name: dragon-scale-data-collector
    ports:
      - "5001:5001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5000
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - dragon-scale-network
    privileged: true  # Required for raw socket access
    restart: unless-stopped

  # High-speed XDP Collector (bare-metal / privileged container)
  xdp-collector:
    build:
      context: ./backend
      dockerfile: xdp-collector/Dockerfile
    container_name: dragon-scale-xdp-collector
    # XDP requires host networking and privileges to attach to NIC
    network_mode: "host"
    privileged: true
    environment:
      - PORT=5012
      - XDP_ENABLED=true
      - XDP_INTERFACE=eth0
      - XDP_QUEUE_COUNT=1
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - AUTH_SERVICE_URL=http://localhost:5000
    depends_on:
      - auth-service
    restart: unless-stopped

  # Alert Service
  alert-service:
    build:
      context: ./backend
      dockerfile: alert-service/Dockerfile
    container_name: dragon-scale-alert-service
    ports:
      - "5002:5002"
    environment:
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5000
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-admin@example.com}
    depends_on:
      - redis
      - auth-service
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # AI Detection Engine
  ai-engine:
    build:
      context: ./backend
      dockerfile: ai-engine/Dockerfile
    container_name: dragon-scale-ai-engine
    ports:
      - "5003:5003"
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MODEL_PATH=/models
      - CONFIDENCE_THRESHOLD=0.85
      - BATCH_SIZE=1000
      - AUTH_SERVICE_URL=http://auth-service:5000
    volumes:
      - ai_models:/models
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - dragon-scale-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Elasticsearch for logging (optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: dragon-scale-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # Kibana for log visualization (optional)
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.0
    container_name: dragon-scale-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # Policy Orchestrator
  policy-orchestrator:
    build:
      context: ./backend
      dockerfile: policy-orchestrator/Dockerfile
    container_name: dragon-scale-policy-orchestrator
    ports:
      - "5004:5004"
    environment:
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5000
    depends_on:
      - redis
      - auth-service
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # DRL Engine
  drl-engine:
    build:
      context: ./backend
      dockerfile: drl-engine/Dockerfile
    container_name: dragon-scale-drl-engine
    ports:
      - "5005:5005"
    environment:
      - REDIS_URL=redis://redis:6379
      - AI_ENGINE_URL=http://ai-engine:5003
      - POLICY_SERVICE_URL=http://policy-orchestrator:5004
      - MODEL_PATH=/models/drl
      - AUTH_SERVICE_URL=http://auth-service:5000
      # Shadow mode: decisions logged + tagged shadow=true, NOT enforced.
      # Promotion ladder: shadow → canary → enforce. See docs/RISK-TIERS.md.
      - DRL_SHADOW_MODE=${DRL_SHADOW_MODE:-true}
    volumes:
      - ai_models:/models
    depends_on:
      - redis
      - ai-engine
      - policy-orchestrator
      - auth-service
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # XAI Service
  xai-service:
    build:
      context: ./backend
      dockerfile: xai-service/Dockerfile
    container_name: dragon-scale-xai-service
    ports:
      - "5006:5006"
    environment:
      - REDIS_URL=redis://redis:6379
      - AI_ENGINE_URL=http://ai-engine:5003
      - DRL_ENGINE_URL=http://drl-engine:5005
      - AUTH_SERVICE_URL=http://auth-service:5000
    depends_on:
      - redis
      - auth-service
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # Compliance Engine
  compliance-engine:
    build:
      context: ./backend
      dockerfile: compliance-engine/Dockerfile
    container_name: dragon-scale-compliance-engine
    ports:
      - "5007:5007"
    environment:
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5000
    depends_on:
      - redis
      - auth-service
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # HIDS Agent - eBPF-powered host intrusion detection
  hids-agent:
    build:
      context: ./backend
      dockerfile: hids-agent/Dockerfile
    container_name: dragon-scale-hids-agent
    ports:
      - "5010:5010"
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AUTH_SERVICE_URL=http://auth-service:5000
      - FIM_PATHS=/etc/passwd,/etc/shadow,/etc/sudoers,/etc/ssh/sshd_config
      - HOST_ROOT=/host
      - FIM_CHECK_INTERVAL=60
    volumes:
      - /etc:/host/etc:ro
      - /var/log:/host/var/log:ro
      - /proc:/host/proc:ro
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - dragon-scale-network
    privileged: true
    restart: unless-stopped

  # System Hardening Service (eBPF runtime enforcement + CIS benchmarks)
  hardening-service:
    build:
      context: ./backend
      dockerfile: hardening-service/Dockerfile
    container_name: dragon-scale-hardening-service
    ports:
      - "5011:5011"
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AUTH_SERVICE_URL=http://auth-service:5000
      - HOST_ROOT=/host
    volumes:
      - /etc:/host/etc:rw
      - /proc:/host/proc:ro
      - hardening_backups:/var/lib/dragon-scale/backups
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - dragon-scale-network
    privileged: true
    restart: unless-stopped

  # Admin Console (production-ready build)
  admin-console:
    build:
      context: ./frontend/admin-console
      dockerfile: Dockerfile
    container_name: dragon-scale-admin-console
    ports:
      - "3000:8080"
    environment:
      - DRAGON_SCALE_API_PROXY=http://api-gateway:8080
      - DRAGON_SCALE_ENV=production
    depends_on:
      - api-gateway
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # Prometheus metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: dragon-scale-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # Grafana dashboards
  grafana:
    image: grafana/grafana:10.4.0
    container_name: dragon-scale-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-dragon-scale}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # Tempo — distributed tracing backend. Phase 0 slice 5 pilot.
  # Opt-in profile so the default `docker compose up` stays lightweight.
  # Enable with: `docker compose --profile observability up -d tempo`
  # then export OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317 before restarting
  # the api-gateway container.
  tempo:
    image: grafana/tempo:2.5.0
    container_name: dragon-scale-tempo
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo HTTP (queries)
      - "4317:4317"   # OTLP gRPC receiver
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - dragon-scale-network
    restart: unless-stopped

  # ── Flink Stream Processing Jobs ──────────────────────────────────────────

  flink-anomaly-detection:
    build:
      context: ./stream-processing/flink-jobs
      dockerfile: Dockerfile.anomaly
    container_name: dragon-scale-flink-anomaly
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - FLINK_PARALLELISM=2
      - CHECKPOINT_DIR=file:///tmp/flink-checkpoints/anomaly
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - dragon-scale-network
    restart: unless-stopped

  flink-feature-extraction:
    build:
      context: ./stream-processing/flink-jobs
      dockerfile: Dockerfile.feature
    container_name: dragon-scale-flink-features
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_INPUT_TOPIC=dragon-scale-network-events
      - KAFKA_OUTPUT_TOPIC=extracted_features
      - FLINK_PARALLELISM=2
      - CHECKPOINT_DIR=file:///tmp/flink-checkpoints/features
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - dragon-scale-network
    restart: unless-stopped

  flink-drl-feed:
    build:
      context: ./stream-processing/flink-jobs
      dockerfile: Dockerfile.drl-feed
    container_name: dragon-scale-flink-drl-feed
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DRL_ENGINE_URL=http://drl-engine:5005
      - POLICY_SERVICE_URL=http://policy-orchestrator:5004
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      - FLINK_PARALLELISM=1
      - CHECKPOINT_DIR=file:///tmp/flink-checkpoints/drl-feed
    depends_on:
      kafka:
        condition: service_healthy
      drl-engine:
        condition: service_started
      policy-orchestrator:
        condition: service_started
    networks:
      - dragon-scale-network
    restart: unless-stopped

networks:
  dragon-scale-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  es_data:
  ai_models:
  hardening_backups:
  prometheus_data:
  grafana_data:
  tempo_data: