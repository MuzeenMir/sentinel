apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "dragon-scale.fullname" . }}-api-gateway
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "dragon-scale.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "dragon-scale.fullname" . }}-auth-service
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "dragon-scale.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "dragon-scale.fullname" . }}-alert-service
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: alert-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "dragon-scale.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: alert-service
