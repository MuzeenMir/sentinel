apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dragon-scale.fullname" . }}-ai-engine
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
spec:
  replicas: {{ .Values.aiEngine.replicaCount }}
  selector:
    matchLabels:
      {{- include "dragon-scale.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ai-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "dragon-scale.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ai-engine
        app.kubernetes.io/part-of: dragon-scale
    spec:
      serviceAccountName: {{ include "dragon-scale.fullname" . }}-ai-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: ai-engine
          image: {{ include "dragon-scale.image" (dict "service" .Values.aiEngine "global" .Values) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.aiEngine.port }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "ai-engine"
            {{- include "dragon-scale.commonEnv" . | nindent 12 }}
            - name: MODEL_PATH
              value: "/models"
            - name: CONFIDENCE_THRESHOLD
              value: "0.85"
            - name: BATCH_SIZE
              value: "1000"
          resources:
            {{- toYaml .Values.aiEngine.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- if .Values.aiEngine.modelVolume.enabled }}
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ include "dragon-scale.fullname" . }}-ai-models
        {{- else }}
        - name: model-storage
          emptyDir:
            sizeLimit: 10Gi
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dragon-scale.fullname" . }}-ai-engine
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.aiEngine.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dragon-scale.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
{{- if .Values.aiEngine.modelVolume.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dragon-scale.fullname" . }}-ai-models
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-engine
spec:
  accessModes:
    - ReadWriteMany
  {{- if .Values.aiEngine.modelVolume.storageClass }}
  storageClassName: {{ .Values.aiEngine.modelVolume.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.aiEngine.modelVolume.size }}
{{- end }}
