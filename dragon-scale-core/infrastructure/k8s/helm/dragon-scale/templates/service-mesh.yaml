apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: {{ include "dragon-scale.fullname" . }}-strict-mtls
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ include "dragon-scale.fullname" . }}-deny-all
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
spec:
  {}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ include "dragon-scale.fullname" . }}-allow-dragon-scale-internal
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - {{ .Release.Namespace }}
            principals:
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/*"
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ include "dragon-scale.fullname" . }}-api-gateway-external
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: api-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - istio-system
              - ingress-nginx
    - from:
        - source:
            namespaces:
              - {{ .Release.Namespace }}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ include "dragon-scale.fullname" . }}-ai-engine
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: ai-engine
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ include "dragon-scale.fullname" . }}-api-gateway"
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ include "dragon-scale.fullname" . }}-drl-engine"
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ include "dragon-scale.fullname" . }}-xai-service"
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ include "dragon-scale.fullname" . }}-drl-engine
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: drl-engine
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ include "dragon-scale.fullname" . }}-api-gateway"
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ include "dragon-scale.fullname" . }}-xai-service"
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ include "dragon-scale.fullname" . }}-policy-orchestrator
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: policy-orchestrator
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ include "dragon-scale.fullname" . }}-api-gateway"
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ include "dragon-scale.fullname" . }}-drl-engine"
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ include "dragon-scale.fullname" . }}-mtls
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
spec:
  host: "*.{{ .Release.Namespace }}.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
