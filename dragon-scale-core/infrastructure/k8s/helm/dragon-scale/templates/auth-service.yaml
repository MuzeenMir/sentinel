apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dragon-scale.fullname" . }}-auth-service
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  replicas: {{ .Values.authService.replicaCount }}
  selector:
    matchLabels:
      {{- include "dragon-scale.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth-service
  template:
    metadata:
      labels:
        {{- include "dragon-scale.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth-service
    spec:
      containers:
        - name: auth-service
          image: {{ include "dragon-scale.image" (dict "service" .Values.authService "global" .Values) }}
          ports:
            - containerPort: {{ .Values.authService.port }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "auth-service"
            {{- include "dragon-scale.commonEnv" . | nindent 12 }}
            - name: JWT_ACCESS_EXPIRES_HOURS
              value: {{ .Values.authService.env.JWT_ACCESS_EXPIRES_HOURS | quote }}
          resources:
            {{- toYaml .Values.authService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.authService.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.authService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dragon-scale.fullname" . }}-auth-service
  labels:
    {{- include "dragon-scale.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.authService.port }}
      targetPort: {{ .Values.authService.port }}
      protocol: TCP
  selector:
    {{- include "dragon-scale.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
